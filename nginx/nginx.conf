worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # ===== Rate limiting (NFR-03 — edge absorption) =====
    # Burst absorption for the purchase hot path. Sized so that 1000 VUs cause
    # graceful 429s rather than 5xx, while still letting real customers in.
    limit_req_zone $binary_remote_addr zone=purchase_zone:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=general_zone:10m rate=50r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    log_format jsonlog escape=json
        '{"ts":"$time_iso8601","ip":"$remote_addr","req":"$request",'
        '"status":$status,"bytes":$body_bytes_sent,'
        '"upstream":"$upstream_addr","rt":$request_time}';
    access_log /var/log/nginx/access.log jsonlog;

    # ===== Upstream load balancer (NFR-02 — ≥2 api replicas) =====
    upstream api_upstream {
        least_conn;
        server api1:3000 max_fails=3 fail_timeout=10s;
        server api2:3000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    # ===== Predictions microservice (MiroFish + Gemini orchestrator) =====
    upstream predictions_upstream {
        server predictions:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream web_upstream {
        server web:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 12m;

        # ===== /api/admin/predictions/* → microservice =====
        location /api/admin/predictions {
            limit_req zone=general_zone burst=20 nodelay;
            error_page 429 = @rate_limited;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 90s;
            proxy_pass http://predictions_upstream;
        }

        # ===== /api/purchase/* — tightest limits =====
        location /api/purchase/ {
            limit_req zone=purchase_zone burst=20 nodelay;
            limit_conn conn 32;
            error_page 429 = @rate_limited;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://api_upstream;
        }

        # ===== /api/auth/login & /api/auth/register =====
        location ~ ^/api/auth/(login|register|change-password)$ {
            limit_req zone=auth_zone burst=5 nodelay;
            error_page 429 = @rate_limited;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://api_upstream;
        }

        # ===== WebSocket (real-time stock) =====
        location /ws/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass http://api_upstream;
        }

        # ===== Catch-all API =====
        location /api/ {
            limit_req zone=general_zone burst=100 nodelay;
            error_page 429 = @rate_limited;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://api_upstream;
        }

        # ===== Public uploads (sanitized images only) =====
        location /uploads/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
            try_files $uri =404;
        }

        # ===== Frontend (Next.js) =====
        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://web_upstream;
        }

        location @rate_limited {
            default_type application/json;
            return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many requests. Please slow down."}}';
        }
    }
}
